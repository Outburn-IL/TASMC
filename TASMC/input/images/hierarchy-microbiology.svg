<?xml version="1.0" encoding="UTF-8"?>
<svg width="570" height="365" viewBox="0 0 570 365" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .t1 { font-size: 12px; font-weight: bold; fill: white; text-anchor: middle; dominant-baseline: middle; }
    .ln { stroke: #BDBDBD; stroke-width: 1.8; fill: none; }
    .ls { stroke: #9E9E9E; stroke-width: 1.4; stroke-dasharray: 5,3; fill: none; }
    .bg { fill: #F5F7FA; }
    .dsh { stroke: #BDBDBD; stroke-width: 1.4; stroke-dasharray: 5,4; fill: #F0F0F0; }
    .dt { font-size: 14px; fill: #BDBDBD; text-anchor: middle; dominant-baseline: middle; }
    .note { font-size: 9px; fill: #757575; text-anchor: middle; font-style: italic; }
  </style>

  <rect class="bg" width="570" height="365" rx="12"/>

  <!-- Report ─ ─ Specimen (side) -->
  <line class="ls" x1="330" y1="42" x2="355" y2="42"/>

  <!-- Report → Row 2 -->
  <line class="ln" x1="250" y1="64" x2="250" y2="100"/>
  <line class="ln" x1="110" y1="100" x2="470" y2="100"/>
  <line class="ln" x1="110" y1="100" x2="110" y2="110"/>
  <line class="ln" x1="310" y1="100" x2="310" y2="110"/>
  <line class="ln" x1="470" y1="100" x2="470" y2="110"/>

  <!-- Culture → Row 3 (organisms) -->
  <line class="ln" x1="310" y1="154" x2="310" y2="187"/>
  <line class="ln" x1="185" y1="187" x2="458" y2="187"/>
  <line class="ln" x1="185" y1="187" x2="185" y2="197"/>
  <line class="ln" x1="340" y1="187" x2="340" y2="197"/>
  <line class="ln" x1="458" y1="187" x2="458" y2="197"/>

  <!-- Organism 1 → Row 4 (antibiotics) -->
  <line class="ln" x1="185" y1="241" x2="185" y2="271"/>
  <line class="ln" x1="90"  y1="271" x2="315" y2="271"/>
  <line class="ln" x1="90"  y1="271" x2="90"  y2="281"/>
  <line class="ln" x1="215" y1="271" x2="215" y2="281"/>
  <line class="ln" x1="315" y1="271" x2="315" y2="281"/>

  <!-- דוח תרבית -->
  <rect x="170" y="20" width="160" height="44" rx="7" fill="#1565C0"/>
  <text class="t1" x="250" y="42">דוח תרבית</text>

  <!-- דגימה (side) -->
  <rect x="355" y="20" width="130" height="44" rx="7" fill="#4A148C"/>
  <text class="t1" x="420" y="42">דגימה</text>

  <!-- בדיקה (generic) -->
  <rect x="30" y="110" width="160" height="44" rx="7" fill="#2E7D32"/>
  <text class="t1" x="110" y="132">בדיקה</text>

  <!-- תרבית חיובית -->
  <rect x="230" y="110" width="160" height="44" rx="7" fill="#004D40"/>
  <text class="t1" x="310" y="132">תרבית חיובית</text>

  <!-- ellipsis row 2 -->
  <rect class="dsh" x="440" y="110" width="70" height="44" rx="7"/>
  <text class="dt" x="475" y="132">· · ·</text>

  <!-- מיקרואורגניזם 1 -->
  <rect x="115" y="197" width="140" height="44" rx="7" fill="#00695C"/>
  <text class="t1" x="185" y="219">מיקרואורגניזם</text>

  <!-- מיקרואורגניזם 2 -->
  <rect x="270" y="197" width="140" height="44" rx="7" fill="#00695C"/>
  <text class="t1" x="340" y="219">מיקרואורגניזם</text>

  <!-- ellipsis row 3 -->
  <rect class="dsh" x="425" y="197" width="65" height="44" rx="7"/>
  <text class="dt" x="458" y="219">· · ·</text>

  <!-- note -->
  <text class="note" x="185" y="265">לכל חיידק:</text>

  <!-- רגישות 1 -->
  <rect x="35" y="281" width="110" height="44" rx="7" fill="#1B5E20"/>
  <text class="t1" x="90" y="303">רגישות לתרופה</text>

  <!-- רגישות 2 -->
  <rect x="160" y="281" width="110" height="44" rx="7" fill="#1B5E20"/>
  <text class="t1" x="215" y="303">רגישות לתרופה</text>

  <!-- ellipsis row 4 -->
  <rect class="dsh" x="285" y="281" width="60" height="44" rx="7"/>
  <text class="dt" x="315" y="303">· · ·</text>

</svg>
