<?xml version="1.0" encoding="UTF-8"?>
<svg width="545" height="265" viewBox="0 0 545 265" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .t1 { font-size: 12px; font-weight: bold; fill: white; text-anchor: middle; dominant-baseline: middle; }
    .ln { stroke: #BDBDBD; stroke-width: 1.8; fill: none; }
    .ls { stroke: #9E9E9E; stroke-width: 1.4; stroke-dasharray: 5,3; fill: none; }
    .bg { fill: #F5F7FA; }
    .dsh { stroke: #BDBDBD; stroke-width: 1.4; stroke-dasharray: 5,4; fill: #F0F0F0; }
    .dt { font-size: 14px; fill: #BDBDBD; text-anchor: middle; dominant-baseline: middle; }
  </style>

  <rect class="bg" width="545" height="265" rx="12"/>

  <!-- Report ─ ─ Specimen (side) -->
  <line class="ls" x1="335" y1="42" x2="355" y2="42"/>

  <!-- Report → Row 2 -->
  <line class="ln" x1="255" y1="64" x2="255" y2="100"/>
  <line class="ln" x1="150" y1="100" x2="385" y2="100"/>
  <line class="ln" x1="150" y1="100" x2="150" y2="110"/>
  <line class="ln" x1="385" y1="100" x2="385" y2="110"/>

  <!-- Panel → Row 3 -->
  <line class="ln" x1="385" y1="154" x2="385" y2="185"/>
  <line class="ln" x1="260" y1="185" x2="490" y2="185"/>
  <line class="ln" x1="260" y1="185" x2="260" y2="195"/>
  <line class="ln" x1="385" y1="185" x2="385" y2="195"/>
  <line class="ln" x1="490" y1="185" x2="490" y2="195"/>

  <!-- דוח מעבדה -->
  <rect x="175" y="20" width="160" height="44" rx="7" fill="#1565C0"/>
  <text class="t1" x="255" y="42">דוח מעבדה</text>

  <!-- דגימה (side) -->
  <rect x="355" y="20" width="130" height="44" rx="7" fill="#4A148C"/>
  <text class="t1" x="420" y="42">דגימה</text>

  <!-- בדיקה עצמאית -->
  <rect x="70" y="110" width="160" height="44" rx="7" fill="#00695C"/>
  <text class="t1" x="150" y="132">בדיקה עצמאית</text>

  <!-- פאנל בדיקות -->
  <rect x="305" y="110" width="160" height="44" rx="7" fill="#1B5E20"/>
  <text class="t1" x="385" y="132">פאנל בדיקות</text>

  <!-- בדיקה 1 -->
  <rect x="205" y="195" width="110" height="44" rx="7" fill="#2E7D32"/>
  <text class="t1" x="260" y="217">בדיקה</text>

  <!-- בדיקה 2 -->
  <rect x="330" y="195" width="110" height="44" rx="7" fill="#2E7D32"/>
  <text class="t1" x="385" y="217">בדיקה</text>

  <!-- ellipsis -->
  <rect class="dsh" x="455" y="195" width="65" height="44" rx="7"/>
  <text class="dt" x="488" y="217">· · ·</text>

</svg>
