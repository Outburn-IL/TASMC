<?xml version="1.0" encoding="UTF-8"?>
<svg width="560" height="200" viewBox="0 0 560 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .t1 { font-size: 12px; font-weight: bold; fill: white; text-anchor: middle; dominant-baseline: middle; }
    .ln { stroke: #BDBDBD; stroke-width: 1.8; fill: none; }
    .ls { stroke: #9E9E9E; stroke-width: 1.4; stroke-dasharray: 5,3; fill: none; }
    .bg { fill: #F5F7FA; }
  </style>

  <rect class="bg" width="560" height="200" rx="12"/>

  <!-- Report ─ ─ Specimen (side) -->
  <line class="ls" x1="330" y1="42" x2="355" y2="42"/>

  <!-- Report → Row 2 (3 children) -->
  <line class="ln" x1="255" y1="64" x2="255" y2="100"/>
  <line class="ln" x1="90"  y1="100" x2="430" y2="100"/>
  <line class="ln" x1="90"  y1="100" x2="90"  y2="110"/>
  <line class="ln" x1="255" y1="100" x2="255" y2="110"/>
  <line class="ln" x1="430" y1="100" x2="430" y2="110"/>

  <!-- דוח פתולוגיה -->
  <rect x="175" y="20" width="155" height="44" rx="7" fill="#1565C0"/>
  <text class="t1" x="253" y="42">דוח פתולוגיה</text>

  <!-- דגימה (side) -->
  <rect x="355" y="20" width="130" height="44" rx="7" fill="#4A148C"/>
  <text class="t1" x="420" y="42">דגימה</text>

  <!-- ממצא מקרוסקופי -->
  <rect x="15" y="110" width="150" height="44" rx="7" fill="#2E7D32"/>
  <text class="t1" x="90" y="128">ממצא</text>
  <text class="t1" x="90" y="146">מקרוסקופי</text>

  <!-- ממצא מיקרוסקופי -->
  <rect x="180" y="110" width="150" height="44" rx="7" fill="#2E7D32"/>
  <text class="t1" x="255" y="128">ממצא</text>
  <text class="t1" x="255" y="146">מיקרוסקופי</text>

  <!-- ממאירות -->
  <rect x="355" y="110" width="150" height="44" rx="7" fill="#6A1B9A"/>
  <text class="t1" x="430" y="132">ממאירות</text>

</svg>
